# 2syn 跨平台編譯器設定
# 安裝桌面工具鏈：
#   brew install mingw-w64
#   brew tap SergioBenitez/osxct && brew install x86_64-unknown-linux-gnu
# Android NDK 已透過 Android Studio / sdkmanager 安裝
# iOS 使用 Xcode 內建工具鏈（無需額外安裝）

[target.x86_64-pc-windows-gnu]
linker = "x86_64-w64-mingw32-gcc"
ar = "x86_64-w64-mingw32-ar"

[target.x86_64-unknown-linux-gnu]
linker = "x86_64-unknown-linux-gnu-gcc"
ar = "x86_64-unknown-linux-gnu-ar"

# Android NDK 工具鏈 (NDK 28.2.13676358, API Level 24)
[target.aarch64-linux-android]
linker = "/Users/barretlin/Library/Android/sdk/ndk/28.2.13676358/toolchains/llvm/prebuilt/darwin-x86_64/bin/aarch64-linux-android24-clang"
ar = "/Users/barretlin/Library/Android/sdk/ndk/28.2.13676358/toolchains/llvm/prebuilt/darwin-x86_64/bin/llvm-ar"

[target.armv7-linux-androideabi]
linker = "/Users/barretlin/Library/Android/sdk/ndk/28.2.13676358/toolchains/llvm/prebuilt/darwin-x86_64/bin/armv7a-linux-androideabi24-clang"
ar = "/Users/barretlin/Library/Android/sdk/ndk/28.2.13676358/toolchains/llvm/prebuilt/darwin-x86_64/bin/llvm-ar"

[target.x86_64-linux-android]
linker = "/Users/barretlin/Library/Android/sdk/ndk/28.2.13676358/toolchains/llvm/prebuilt/darwin-x86_64/bin/x86_64-linux-android24-clang"
ar = "/Users/barretlin/Library/Android/sdk/ndk/28.2.13676358/toolchains/llvm/prebuilt/darwin-x86_64/bin/llvm-ar"

[target.i686-linux-android]
linker = "/Users/barretlin/Library/Android/sdk/ndk/28.2.13676358/toolchains/llvm/prebuilt/darwin-x86_64/bin/i686-linux-android24-clang"
ar = "/Users/barretlin/Library/Android/sdk/ndk/28.2.13676358/toolchains/llvm/prebuilt/darwin-x86_64/bin/llvm-ar"

[env]
# ring crate build script 需要明確指定跨平台 C 編譯器
CC_x86_64_unknown_linux_gnu = "/opt/homebrew/bin/x86_64-unknown-linux-gnu-gcc"
CC_x86_64_pc_windows_gnu = "/opt/homebrew/bin/x86_64-w64-mingw32-gcc"

# Android NDK CC 設定
ANDROID_NDK_ROOT = "/Users/barretlin/Library/Android/sdk/ndk/28.2.13676358"
CC_aarch64_linux_android = "/Users/barretlin/Library/Android/sdk/ndk/28.2.13676358/toolchains/llvm/prebuilt/darwin-x86_64/bin/aarch64-linux-android24-clang"
CC_armv7_linux_androideabi = "/Users/barretlin/Library/Android/sdk/ndk/28.2.13676358/toolchains/llvm/prebuilt/darwin-x86_64/bin/armv7a-linux-androideabi24-clang"
CC_x86_64_linux_android = "/Users/barretlin/Library/Android/sdk/ndk/28.2.13676358/toolchains/llvm/prebuilt/darwin-x86_64/bin/x86_64-linux-android24-clang"
CC_i686_linux_android = "/Users/barretlin/Library/Android/sdk/ndk/28.2.13676358/toolchains/llvm/prebuilt/darwin-x86_64/bin/i686-linux-android24-clang"
AR_aarch64_linux_android = "/Users/barretlin/Library/Android/sdk/ndk/28.2.13676358/toolchains/llvm/prebuilt/darwin-x86_64/bin/llvm-ar"
AR_armv7_linux_androideabi = "/Users/barretlin/Library/Android/sdk/ndk/28.2.13676358/toolchains/llvm/prebuilt/darwin-x86_64/bin/llvm-ar"
AR_x86_64_linux_android = "/Users/barretlin/Library/Android/sdk/ndk/28.2.13676358/toolchains/llvm/prebuilt/darwin-x86_64/bin/llvm-ar"
AR_i686_linux_android = "/Users/barretlin/Library/Android/sdk/ndk/28.2.13676358/toolchains/llvm/prebuilt/darwin-x86_64/bin/llvm-ar"

[target.aarch64-apple-darwin]
rustflags = [
    "-C", "link-args=-Wl,-rpath,/usr/lib/swift",
    "-C", "link-args=-Wl,-rpath,@loader_path/../Frameworks"
]

[target.x86_64-apple-darwin]
rustflags = [
    "-C", "link-args=-Wl,-rpath,/usr/lib/swift",
    "-C", "link-args=-Wl,-rpath,@loader_path/../Frameworks"
]
