# 2syn 跨平台編譯器設定
# 安裝桌面工具鏈：
#   brew install mingw-w64
#   brew tap SergioBenitez/osxct && brew install x86_64-unknown-linux-gnu
# Android NDK 已透過 Android Studio / sdkmanager 安裝
# iOS 使用 Xcode 內建工具鏈（無需額外安裝）

[target.x86_64-pc-windows-gnu]
linker = "x86_64-w64-mingw32-gcc"
ar = "x86_64-w64-mingw32-ar"

[target.x86_64-unknown-linux-gnu]
linker = "x86_64-unknown-linux-gnu-gcc"
ar = "x86_64-unknown-linux-gnu-ar"

[env]
CC_x86_64_unknown_linux_gnu = "x86_64-unknown-linux-gnu-gcc"
CC_x86_64_pc_windows_gnu = "x86_64-w64-mingw32-gcc"

[target.aarch64-apple-darwin]
rustflags = [
    "-C", "link-args=-Wl,-rpath,/usr/lib/swift",
    "-C", "link-args=-Wl,-rpath,@loader_path/../Frameworks"
]

[target.x86_64-apple-darwin]
rustflags = [
    "-C", "link-args=-Wl,-rpath,/usr/lib/swift",
    "-C", "link-args=-Wl,-rpath,@loader_path/../Frameworks"
]
